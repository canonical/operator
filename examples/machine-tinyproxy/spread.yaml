project: tinyproxy

backends:
  craft:
    type: craft
    systems:
      - ubuntu-24.04:

prepare: |
  # Juju needs the charm etc. to be owned by the running user.
  chown -R "${USER}" "${PROJECT_PATH}"

suites:
  spread/integration/:
    summary: Integration tests

    environment:
      # `uv tool install` places binaries under the invoking user's ~/.local/bin.
      PATH: $PATH:/root/.local/bin

    prepare: |
      sudo snap install --classic concierge
      sudo concierge prepare --trace -p machine --extra-snaps astral-uv
      uv tool install tox --with tox-uv

exclude:
  - .git
  - .tox
  - .venv
  - .ruff_cache
  - .pytest_cache
  - .coverage

kill-timeout: 90m
