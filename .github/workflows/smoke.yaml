name: ops Smoke Tests

on:
  workflow_dispatch:
  schedule:
    - cron: '1 7 25 * *'

permissions: {}

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        juju-channel: ['2.9/stable', '3/stable', '4/stable']
        preset: ['machine', 'microk8s']
    continue-on-error: ${{ matrix.juju-channel == '4/stable' && matrix.preset == 'microk8s' }}

    steps:
      - run: sudo snap install --classic concierge
      - run: >
          sudo concierge prepare
          --juju-channel=${{ matrix.juju-channel }}
          --charmcraft-channel=3.x/stable
          -p "${{ matrix.preset }}"
      - name: Checkout the repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0

      - run: uv tool install tox --with tox-uv

      - name: Run smoke tests
        run: tox -e smoke
        timeout-minutes: 20  # Juju 4 gets stuck while destroying the test model

      - name: Archive charmcraft logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: charmcraft-logs
          path: /home/runner/.local/state/charmcraft/log/*.log

  open-issue-on-failure-if-scheduled:
    if: ${{ failure() && github.event_name == 'schedule' }}
    needs: [test]
    runs-on: ubuntu-latest

    permissions:
      issues: write

    steps:
      - name: Create issue on failure
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_NAME: ${{ github.workflow }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh issue create \
            --repo "$REPO" \
            --title "Scheduled workflow '$WORKFLOW_NAME' failed" \
            --body "Scheduled workflow '$WORKFLOW_NAME' failed: $RUN_URL"
