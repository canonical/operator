name: Example Charm Integration Tests

on:
  workflow_dispatch:
  schedule:
    - cron: '50 15 * * 2'  # 15:50 UTC Tuesdays
  pull_request:

permissions: {}

concurrency:
  # Cancel in-flight PR runs when new commits are pushed. Scheduled and
  # manual-dispatch runs are never cancelled (they use a different group).
  group: example-charm-integration-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # On PRs, detect which example directories have changed. On schedule and
  # manual dispatch, all examples are selected.
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      machine-tinyproxy: ${{ steps.check.outputs.machine-tinyproxy }}
      k8s-1-minimal: ${{ steps.check.outputs.k8s-1-minimal }}
      k8s-2-configurable: ${{ steps.check.outputs.k8s-2-configurable }}
      k8s-3-postgresql: ${{ steps.check.outputs.k8s-3-postgresql }}
      k8s-4-action: ${{ steps.check.outputs.k8s-4-action }}
      k8s-5-observe: ${{ steps.check.outputs.k8s-5-observe }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          persist-credentials: false
          fetch-depth: 0  # Need full history to diff against the base branch.
      - id: check
        run: |
          # httpbin-demo runs under example-charm-charmcraft-test.yaml instead.
          examples='machine-tinyproxy k8s-1-minimal k8s-2-configurable k8s-3-postgresql k8s-4-action k8s-5-observe'
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            # On schedule and manual dispatch, run all examples.
            for dir in $examples; do
              echo "$dir=true" >> "$GITHUB_OUTPUT"
            done
            exit 0
          fi
          # On PRs, run only examples that have changed.
          base='origin/${GITHUB_BASE_REF}'
          for dir in $examples; do
            if git diff --name-only "$base...HEAD" -- "examples/$dir/" | grep -q .; then
              echo "$dir=true" >> "$GITHUB_OUTPUT"
            else
              echo "$dir=false" >> "$GITHUB_OUTPUT"
            fi
          done

  machine-tinyproxy:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.machine-tinyproxy == 'true' }}
    uses: ./.github/workflows/_example-integration.yaml
    with:
      dir: examples/machine-tinyproxy
      preset: machine

  k8s-1-minimal:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.k8s-1-minimal == 'true' }}
    uses: ./.github/workflows/_example-integration.yaml
    with:
      dir: examples/k8s-1-minimal
      preset: microk8s

  k8s-2-configurable:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.k8s-2-configurable == 'true' }}
    uses: ./.github/workflows/_example-integration.yaml
    with:
      dir: examples/k8s-2-configurable
      preset: microk8s

  k8s-3-postgresql:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.k8s-3-postgresql == 'true' }}
    uses: ./.github/workflows/_example-integration.yaml
    with:
      dir: examples/k8s-3-postgresql
      preset: microk8s

  k8s-4-action:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.k8s-4-action == 'true' }}
    uses: ./.github/workflows/_example-integration.yaml
    with:
      dir: examples/k8s-4-action
      preset: microk8s

  k8s-5-observe:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.k8s-5-observe == 'true' }}
    uses: ./.github/workflows/_example-integration.yaml
    with:
      dir: examples/k8s-5-observe
      preset: microk8s

  open-issue-on-failure-if-scheduled:
    if: ${{ failure() && github.event_name == 'schedule' }}
    needs:
      - detect-changes
      - machine-tinyproxy
      - k8s-1-minimal
      - k8s-2-configurable
      - k8s-3-postgresql
      - k8s-4-action
      - k8s-5-observe
    permissions:
      issues: write
    uses: ./.github/workflows/notify-scheduled-failure.yaml
