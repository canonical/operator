name: Notify on scheduled failure

# Reusable workflow: opens (or comments on) an issue when a scheduled
# workflow fails. Callers gate the invocation with
# `if: failure() && github.event_name == 'schedule'` and pass
# `permissions: issues: write`.
#
# This is stage 1 of the two-stage ai-failure-notifications design (see
# canonical-work-queue's non-roadmap/ai-failure-notifications/PLAN.md,
# "Where it lives" -- staging repo, not shipped here): a cheap, deterministic,
# always-works dedup pre-check with no LLM dependency and no secrets. Stage 2
# is .github/workflows/ai-failure-enrich.yaml, triggered separately by
# `workflow_run` on this workflow's callers, which rewrites whatever this
# stage produced into a triaged artefact.

on:
  workflow_call:

jobs:
  open-issue:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Create or comment on issue, deduping coarsely by workflow name
        env:
          GH_TOKEN: ${{ github.token }}
          WORKFLOW_NAME: ${{ github.workflow }}  # The workflow that called this one.
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          marker="<!-- ai-failure-notifications:run=$RUN_ID:origin="

          # Prefer the scheduled-failure label once it exists in this repo
          # (see PLAN.md Open Questions -- a centrally-managed rollout via
          # canonical-repo-automation, not done as of this workflow's step-5
          # revision); an unlabelled title/body search still works fine as
          # the pre-check in the meantime.
          label_filter=()
          if gh label list --repo "$REPO" --json name -q '.[].name' | grep -qx 'scheduled-failure'; then
            label_filter=(--label scheduled-failure)
          fi

          # Match on the workflow name alone, not the full placeholder
          # sentence: stage 2 (the enricher) rewrites title/body, but always
          # preserves a "Workflow: <name>" footer line specifically so this
          # search keeps working after enrichment. See
          # non-roadmap/ai-failure-notifications/spike-step-3/FINDINGS.md
          # "Candidate-search shape for step 5" in canonical-work-queue --
          # deliberately not the `in:title` form PLAN.md originally sketched,
          # since that spike found human-retitled issues drop the name from
          # the title but keep it in the body.
          match=$(gh issue list --repo "$REPO" --state open "${label_filter[@]}" \
            --search "\"$WORKFLOW_NAME\"" \
            --json number --limit 1 -q '.[0].number // empty')

          if [[ -n "$match" ]]; then
            comment_body="Scheduled workflow '$WORKFLOW_NAME' failed again: $RUN_URL"$'\n\n'"${marker}comment -->"
            gh issue comment "$match" --repo "$REPO" --body "$comment_body"
          else
            issue_body="Scheduled workflow '$WORKFLOW_NAME' failed: $RUN_URL"$'\n\n'"${marker}new -->"
            create_args=(--repo "$REPO" --title "Scheduled workflow '$WORKFLOW_NAME' failed" --body "$issue_body")
            if [[ ${#label_filter[@]} -gt 0 ]]; then
              create_args+=(--label scheduled-failure)
            fi
            gh issue create "${create_args[@]}"
          fi
