name: ops Integration Tests

on:
  workflow_dispatch:
  schedule:
    - cron: '41 7 * * 1'

permissions: {}

jobs:
  collect:
    runs-on: ubuntu-latest
    outputs:
      tests: ${{ steps.tests.outputs.result }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
      - name: Collect integration test files
        id: tests
        run: |
          set -xueo pipefail
          result=$(
            uv run --group integration pytest --collect-only -q --no-header test/integration \
              | grep '::' \
              | awk -F:: '{print $1}' \
              | sort -u \
              | jq -Rnc '[inputs]'
          )
          echo "result=$result" >> "$GITHUB_OUTPUT"

  integration:
    needs: [collect]
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        preset: ['k8s', 'machine']
        juju-channel:
          - 3/stable
          - 4.0/stable
          - 4.0/edge
          - 4.1/edge
        test: ${{ fromJson(needs.collect.outputs.tests) }}
        exclude:
          # tempo-coordinator-k8s only deploys on Kubernetes substrates.
          - preset: machine
            test: test/integration/test_tracing.py

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          persist-credentials: false
      - run: sudo snap install --classic concierge
      # .github/integration/concierge-*.yaml mirrors the upstream concierge
      # preset and adds juju.extra-bootstrap-args: `juju bootstrap` regularly
      # fails on slow GHA runners with `unable to contact api server after
      # 60 attempts` because the default --bootstrap-timeout is too short.
      - run: >
          sudo concierge prepare
          --juju-channel=${{ matrix.juju-channel }}
          -c .github/integration/concierge-${{ matrix.preset }}.yaml
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
      - run: uv tool install tox --with tox-uv
      - run: tox -e integration -- --log-cli-level=INFO -s "$MATRIX_TEST"
        env:
          MATRIX_TEST: ${{ matrix.test }}
        # A backstop for Juju 4 getting stuck while destroying the model. The
        # tracing tests each deploy the tempo stack into their own fresh
        # model, so that file needs longer than the others.
        timeout-minutes: ${{ matrix.test == 'test/integration/test_tracing.py' && 40 || 20 }}

  open-issue-on-failure-if-scheduled:
    if: ${{ failure() && github.event_name == 'schedule' }}
    needs: [integration]
    permissions:
      issues: write
    uses: ./.github/workflows/notify-scheduled-failure.yaml
