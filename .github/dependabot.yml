version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"  # This is hard-coded to the 1st of the month
    labels:
      - "dependencies"
    cooldown:
        default-days: 7
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
    cooldown:
      default-days: 7
  - package-ecosystem: "uv"
    directory: "/examples/httpbin-demo"
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 7
    labels:
      - "dependencies"
  - package-ecosystem: "uv"
    directory: "/examples/k8s-5-observe"
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 7
    ignore:
      - dependency-name: "ops"
      - dependency-name: "ruff"
      - dependency-name: "codespell"
      - dependency-name: "pyright"
      - dependency-name: "coverage"
      - dependency-name: "pytest"
      - dependency-name: "jubilant"
      - dependency-name: "PyYAML"
    labels:
      - "dependencies"
  - package-ecosystem: "uv"
    directory: "/examples/machine-tinyproxy"
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 7
    ignore:
      - dependency-name: "ops"
      - dependency-name: "ruff"
      - dependency-name: "codespell"
      - dependency-name: "pyright"
      - dependency-name: "coverage"
      - dependency-name: "pytest"
      - dependency-name: "jubilant"
      - dependency-name: "PyYAML"
    labels:
      - "dependencies"
