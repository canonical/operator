version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"  # This is hard-coded to the 1st of the month
    labels:
      - "dependencies"
    cooldown:
        default-days: 7
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
    cooldown:
      default-days: 7
